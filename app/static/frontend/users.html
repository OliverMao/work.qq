<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>用户昵称绑定管理</title>
  <link rel="stylesheet" href="/static/frontend/styles.css" />
</head>
<body>
  <div id="app" class="container">
    <header class="hero">
      <div>
        <h1 class="title">用户昵称绑定管理</h1>
        <div class="subtitle">维护 from 里的 user_id 与昵称映射关系，消息展示将优先显示昵称。</div>
      </div>
      <div class="hero-right">
        <a class="nav-link" href="/index">返回首页</a>
        <a class="nav-link" href="/index/modules">返回模块页</a>
        <div class="pill">绑定数: {{ userBindings.length }}</div>
      </div>
    </header>

    <section class="panel">
      <div class="grid" style="margin-bottom: 12px; grid-template-columns: 1fr 1fr auto;">
        <div class="field">
          <label for="create-user-id">user_id</label>
          <input id="create-user-id" v-model.trim="userForm.user_id" placeholder="from 里的 user id" />
        </div>
        <div class="field">
          <label for="create-user-name">昵称</label>
          <input id="create-user-name" v-model.trim="userForm.nickname" placeholder="例如: 小王" />
        </div>
        <div class="toolbar" style="align-self: end;">
          <button class="btn primary" :disabled="loading.create" @click="createUserNickname">
            {{ loading.create ? "创建中..." : "新增绑定" }}
          </button>
        </div>
      </div>

      <div class="toolbar" style="margin-bottom: 10px;">
        <div class="field" style="flex: 1; min-width: 220px;">
          <label for="user-keyword">绑定筛选</label>
          <input id="user-keyword" v-model.trim="keywordInput" placeholder="按 user_id 或昵称过滤" @keyup.enter="applyFilter" />
        </div>
        <button class="btn neutral" :disabled="loading.list" @click="applyFilter">查询</button>
        <button class="btn neutral" :disabled="loading.list" @click="refreshUserBindings">刷新</button>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th style="width: 30%;">user_id</th>
              <th style="width: 32%;">昵称</th>
              <th style="width: 20%;">更新时间</th>
              <th style="width: 18%;">操作</th>
            </tr>
          </thead>
          <tbody v-if="userBindings.length > 0">
            <tr v-for="item in userBindings" :key="item.user_id">
              <td class="mono">{{ item.user_id }}</td>
              <td>
                <input
                  class="input"
                  :value="userEditMap[item.user_id] || ''"
                  @input="onUserNicknameEdit(item.user_id, $event.target.value)"
                  maxlength="128"
                  placeholder="编辑昵称"
                />
              </td>
              <td>{{ formatIsoTime(item.updated_at) }}</td>
              <td>
                <div class="toolbar">
                  <button class="btn ok small" :disabled="loading.updateId === item.user_id" @click="saveUserNickname(item)">
                    {{ loading.updateId === item.user_id ? "保存中" : "保存" }}
                  </button>
                  <button class="btn danger small" :disabled="loading.deleteId === item.user_id" @click="removeUserBinding(item)">
                    {{ loading.deleteId === item.user_id ? "删除中" : "删除" }}
                  </button>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
        <div v-if="userBindings.length === 0" class="empty">
          {{ loading.list ? "正在加载用户绑定..." : "暂无用户昵称绑定" }}
        </div>
      </div>

      <div v-if="message.text" class="message" :class="message.type">{{ message.text }}</div>
    </section>
  </div>

  <script type="module" src="/static/frontend/users.js"></script>
</body>
</html>
